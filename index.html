    <title>極東數位木作工程</title>
    <style>
        /* 消除瀏覽器預設邊距，並讓網頁滿版 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        
        /* 滿版容器設定 */
        .web-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        /* 讓 Canva 的 iframe 完美填滿螢幕 */
        .web-container iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border: none;
            padding: 0;
            margin: 0;
        }
    </style>
</head>
